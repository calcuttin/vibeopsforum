<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Join the VIBEOPS Forum Slack community. Scan the QR code or use the invite link."
    >
    <meta property="og:title" content="VIBEOPS Forum">
    <meta
      property="og:description"
      content="Scan the QR code to join us. More to come."
    >
    <meta property="og:image" content="assets/vibeops-lounge.png">
    <title>VIBEOPS Forum</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section class="hero" aria-label="VIBEOPS Forum invitation">
        <img
          class="hero-photo"
          src="assets/vibeops-lounge.png"
          alt="VIBEOPS Lounge neon sign with a screen inviting people to join the VIBEOPS Forum"
        >
        <div class="hero-shade" aria-hidden="true"></div>

        <div class="hero-content">
          <div class="intro">
            <p class="eyebrow">Community Slack</p>
            <h1>VIBEOPS Forum</h1>
            <p class="lede">
              Scan the QR code to join us. More to come.
            </p>
          </div>

          <aside class="join-panel" aria-label="Join the VIBEOPS Forum Slack">
            <p class="panel-label">Scan to join</p>
            <a
              class="qr-link"
              href="https://join.slack.com/t/vibeopsforum/shared_invite/zt-40mvrfmy8-gqycEL7G~Q2tB5KuNW8tBQ"
              aria-label="Join the VIBEOPS Forum Slack"
            >
              <img
                class="qr-code"
                src="assets/slack-qr.png"
                alt="QR code for the VIBEOPS Forum Slack invite"
              >
            </a>
            <a
              class="join-button"
              href="https://join.slack.com/t/vibeopsforum/shared_invite/zt-40mvrfmy8-gqycEL7G~Q2tB5KuNW8tBQ"
            >
              Join the Slack
            </a>
          </aside>
        </div>
      </section>

      <section class="next">
        <div class="next-inner">
          <p class="eyebrow">Coming soon</p>
          <h2>Events, conversations, and field notes from the VIBEOPS community.</h2>
        </div>
      </section>
    </main>
  </body>
</html>
